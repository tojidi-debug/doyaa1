<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Apps Script 연결</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: "Noto Sans KR", "Malgun Gothic", sans-serif;
      background: #ffffff;
      color: #64748b;
    }
    body {
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      font-size: 13px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div id="msg">Apps Script 화면으로 전환 중입니다.</div>

  <script>
    const params = new URLSearchParams(location.search);
    const targetUrl = params.get('url') || '';
    const name = params.get('name') || 'Apps Script';
    document.getElementById('msg').textContent = name + ' 화면으로 전환 중입니다.';

    if (targetUrl) {
      location.replace(targetUrl);
    } else {
      document.getElementById('msg').textContent = '연결 주소가 없습니다.';
    }
  </script>
</body>
</html>
