<!DOCTYPE html>
<html lang="ko">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <title>한에스시스템 V2.0</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
    }

    body, html {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      background: #f0f4f8;
    }

    /* ══════════════════════════════
       전체 래퍼
    ══════════════════════════════ */
    .wrapper {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ══════════════════════════════
       헤더
    ══════════════════════════════ */
    header {
      height: 58px;
      background: #ffffff;
      border-bottom: 2px solid #e2f4f0;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 14px;
      box-shadow: 0 2px 12px rgba(13,148,136,0.08);
      z-index: 200;
      flex-shrink: 0;
      transition: transform 0.4s ease, opacity 0.3s ease;
    }

    header.hidden {
      transform: translateY(-100%);
      opacity: 0;
      pointer-events: none;
    }

    /* 로고 */
    .logo-section {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
    }
    .logo-section:hover { opacity: 0.8; transform: scale(1.03); }

    .logo-img {
      height: 38px;
      width: auto;
      border-radius: 8px;
      object-fit: contain;
      display: block;
    }

    /* 구분선 */
    .divider {
      width: 1px;
      height: 28px;
      background: #e2e8f0;
      flex-shrink: 0;
    }

    /* ══════════════════════════════
       일반 버튼 영역
    ══════════════════════════════ */
    .nav-area {
      display: flex;
      gap: 6px;
      flex: 1;
      align-items: center;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .nav-area::-webkit-scrollbar { display: none; }

    /* 일반 버튼 */
    .nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1.5px solid #d1e9e6;
      background: #f8fffe;
      color: #1a5c56;
      font-size: 11.5px;
      font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 1px 4px rgba(13,148,136,0.06);
      flex-shrink: 0;
    }

    .nav-btn:hover {
      background: #e6faf7;
      border-color: #0d9488;
      color: #0d6b64;
      box-shadow: 0 3px 10px rgba(13,148,136,0.18);
      transform: translateY(-1px);
    }

    .nav-btn.active {
      background: #0d9488;
      border-color: #0d9488;
      color: #ffffff;
      box-shadow: 0 3px 12px rgba(13,148,136,0.35);
    }

    .nav-btn.active .btn-icon { fill: #ffffff; }

    .btn-icon {
      width: 13px;
      height: 13px;
      fill: #0d9488;
      flex-shrink: 0;
      transition: fill 0.2s;
    }

    .nav-btn:hover .btn-icon { fill: #0d6b64; }

    .btn-text {
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    /* ══════════════════════════════
       Han_AI 단독 영역
    ══════════════════════════════ */
    .han-ai-area {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      margin-left: 4px;
    }

    .btn-han-ai {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 18px;
      border-radius: 22px;
      border: 2px solid #0d9488;
      background: linear-gradient(135deg, #0d9488 0%, #0891b2 100%);
      color: #ffffff;
      font-size: 12.5px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      white-space: nowrap;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow: 0 3px 14px rgba(13,148,136,0.4);
      transition: all 0.25s ease;
      animation: hanaipulse 2.5s ease-in-out infinite;
    }

    @keyframes hanaipulse {
      0%, 100% { box-shadow: 0 3px 14px rgba(13,148,136,0.4); }
      50%       { box-shadow: 0 5px 22px rgba(13,148,136,0.65); }
    }

    .btn-han-ai::before {
      content: '';
      position: absolute;
      top: -60%; left: -60%;
      width: 220%; height: 220%;
      background: linear-gradient(45deg, transparent 35%, rgba(255,255,255,0.2) 50%, transparent 65%);
      animation: hanaishine 3s linear infinite;
    }

    @keyframes hanaishine {
      0%   { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
      100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
    }

    .btn-han-ai:hover {
      background: linear-gradient(135deg, #0f766e 0%, #0e7490 100%);
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 6px 22px rgba(13,148,136,0.55);
    }

    .btn-han-ai .btn-icon {
      width: 15px; height: 15px;
      fill: #ffffff;
    }

    .btn-han-ai .btn-text {
      font-size: 12.5px;
      color: #ffffff;
    }

    /* ══════════════════════════════
       콘텐츠 영역 (iframe)
    ══════════════════════════════ */
    .content-wrapper {
      flex: 1;
      background: #f0f4f8;
      position: relative;
      overflow: hidden;
      display: flex;
    }

    #content-frame {
      width: 100%; height: 100%;
      border: none; margin: 0; padding: 0;
      display: block;
      background: #ffffff;
    }

    /* ══════════════════════════════
       커스텀 알림창
    ══════════════════════════════ */
    #custom-alert {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15,23,42,0.55);
      z-index: 3000;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(4px);
    }

    .modal-content {
      background: #ffffff;
      padding: 32px 36px;
      border-radius: 16px;
      text-align: center;
      color: #1e293b;
      border: 1.5px solid #e2f4f0;
      box-shadow: 0 20px 60px rgba(13,148,136,0.18);
      max-width: 380px;
      min-width: 280px;
    }

    .modal-title {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 16px;
      font-size: 16px; font-weight: 700; color: #0d9488;
    }

    .modal-icon { width: 22px; height: 22px; fill: #0d9488; }

    .modal-message {
      font-size: 14px; line-height: 1.7;
      color: #475569; margin: 12px 0;
    }

    .modal-btn {
      background: linear-gradient(135deg, #0d9488 0%, #0891b2 100%);
      color: #fff; border: none;
      padding: 10px 28px; border-radius: 20px;
      cursor: pointer; margin-top: 16px;
      font-weight: 700; font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      transition: all 0.2s ease;
      box-shadow: 0 3px 10px rgba(13,148,136,0.3);
    }

    .modal-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 5px 16px rgba(13,148,136,0.45);
    }
  </style>
</head>

  <!-- 커스텀 알림창 -->
  <div id="custom-alert">
    <div class="modal-content">
      <div class="modal-title">
        <svg class="modal-icon" viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
        </svg>
        시스템 알림
      </div>
      <div id="modal-text" class="modal-message"></div>
      <button class="modal-btn" onclick="closeAlert()">확인</button>
    </div>
  </div>

  <script>
    /* ── 페이지 새로고침 ── */
    function resetPage() { location.reload(); }

    /* ── 알림창 ── */
    function showAlert(msg) {
      document.getElementById('modal-text').innerText = msg;
      document.getElementById('custom-alert').style.display = 'flex';
    }
    function closeAlert() {
      document.getElementById('custom-alert').style.display = 'none';
    }

    /* ── 일반 iframe 전환 ── */
    function goLink(url, el) {
      document.getElementById('main-header').classList.remove('hidden');
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      if (el) el.classList.add('active');
      document.getElementById('content-frame').src = url;
    }

    /* ── Han_AI 전체화면 전환 ── */
    function goFullScreen(url) {
      document.body.innerHTML = `
        <style>
          *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
          html, body { width:100%; height:100%; overflow:hidden; }
          #ai-wrap { position:absolute; inset:0; display:flex; flex-direction:column; }
          #ai-frame { flex:1; border:none; display:block; width:100%; }
        </style>
        <div id="ai-wrap">
          <iframe id="ai-frame" src="${url}" title="Han_AI"></iframe>
        </div>
      `;
    }

    /* ── 우클릭 금지 ── */
    document.addEventListener('contextmenu', e => {
      e.preventDefault();
      showAlert('보안을 위해 우클릭이 제한됩니다.');
    });

    /* ── 첫 화면: 기준서검색 자동 클릭 ── */
    window.onload = function () {
      const btn = document.getElementById('btn-standard');
      if (btn) btn.click();
    };
  </script>

</body>
</html>
