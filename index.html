<!DOCTYPE html>
<html lang="ko">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <title>구미호시스템 V1.0</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      background: #f0f4f8;
    }

    .wrapper {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      height: 58px;
      background: #ffffff;
      border-bottom: 2px solid #e2f4f0;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 14px;
      box-shadow: 0 2px 12px rgba(13,148,136,0.08);
      z-index: 200;
      flex-shrink: 0;
      transition: transform 0.4s ease, opacity 0.3s ease;
    }

    header.hidden {
      transform: translateY(-100%);
      opacity: 0;
      pointer-events: none;
    }

    body.start-mode header {
      display: none;
    }

    body.start-mode .content-wrapper {
      height: 100vh;
      flex: 1 1 auto;
    }

    .logo-section {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
    }

    .logo-section:hover {
      opacity: 0.8;
      transform: scale(1.03);
    }

    .logo-img {
      height: 38px;
      width: auto;
      border-radius: 8px;
      object-fit: contain;
      display: block;
    }

    .divider {
      width: 1px;
      height: 28px;
      background: #e2e8f0;
      flex-shrink: 0;
    }

    .nav-area {
      display: flex;
      gap: 6px;
      flex: 1;
      align-items: center;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .nav-area::-webkit-scrollbar {
      display: none;
    }

    .nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1.5px solid #d1e9e6;
      background: #f8fffe;
      color: #1a5c56;
      font-size: 11.5px;
      font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 1px 4px rgba(13,148,136,0.06);
      flex-shrink: 0;
    }

    .nav-btn:hover {
      background: #e6faf7;
      border-color: #0d9488;
      color: #0d6b64;
      box-shadow: 0 3px 10px rgba(13,148,136,0.18);
      transform: translateY(-1px);
    }

    .nav-btn.active {
      background: #0d9488;
      border-color: #0d9488;
      color: #ffffff;
      box-shadow: 0 3px 12px rgba(13,148,136,0.35);
    }

    .btn-icon {
      width: 13px;
      height: 13px;
      fill: #0d9488;
      flex-shrink: 0;
      transition: fill 0.2s;
    }

    .nav-btn.active .btn-icon,
    .nav-btn:hover .btn-icon {
      fill: currentColor;
    }

    .btn-text {
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .han-ai-area {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      margin-left: 4px;
    }

    .btn-han-ai {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 18px;
      border-radius: 22px;
      border: 2px solid #0d9488;
      background: linear-gradient(135deg, #0d9488 0%, #0891b2 100%);
      color: #ffffff;
      font-size: 12.5px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      white-space: nowrap;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow: 0 3px 14px rgba(13,148,136,0.4);
      transition: all 0.25s ease;
      animation: hanaipulse 2.5s ease-in-out infinite;
    }

    @keyframes hanaipulse {
      0%, 100% { box-shadow: 0 3px 14px rgba(13,148,136,0.4); }
      50% { box-shadow: 0 5px 22px rgba(13,148,136,0.65); }
    }

    .btn-han-ai:hover {
      background: linear-gradient(135deg, #0f766e 0%, #0e7490 100%);
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 6px 22px rgba(13,148,136,0.55);
    }

    .btn-han-ai .btn-icon,
    .btn-han-ai .btn-text {
      color: #ffffff;
      fill: #ffffff;
    }

    .content-wrapper {
      flex: 1;
      background: #f0f4f8;
      position: relative;
      overflow: hidden;
      display: flex;
    }

    #content-frame {
      width: 100%;
      height: 100%;
      border: none;
      margin: 0;
      padding: 0;
      display: block;
      background: #ffffff;
    }

    #custom-alert {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15,23,42,0.55);
      z-index: 3000;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(4px);
    }

    .modal-content {
      background: #ffffff;
      padding: 32px 36px;
      border-radius: 16px;
      text-align: center;
      color: #1e293b;
      border: 1.5px solid #e2f4f0;
      box-shadow: 0 20px 60px rgba(13,148,136,0.18);
      max-width: 380px;
      min-width: 280px;
    }

    .modal-title {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 16px;
      font-size: 16px;
      font-weight: 700;
      color: #0d9488;
    }

    .modal-icon {
      width: 22px;
      height: 22px;
      fill: #0d9488;
    }

    .modal-message {
      font-size: 14px;
      line-height: 1.7;
      color: #475569;
      margin: 12px 0;
    }

    .modal-btn {
      background: linear-gradient(135deg, #0d9488 0%, #0891b2 100%);
      color: #fff;
      border: none;
      padding: 10px 28px;
      border-radius: 20px;
      cursor: pointer;
      margin-top: 16px;
      font-weight: 700;
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      transition: all 0.2s ease;
      box-shadow: 0 3px 10px rgba(13,148,136,0.3);
    }
  </style>
</head>
<body oncontextmenu="return false">
  <div class="wrapper">
    <header id="main-header">
      <div class="logo-section" onclick="resetPage()" title="새로고침">
        <img class="logo-img" src="https://tojidi-debug.github.io/doyaa1/gumiho.jpg" alt="HanSystem" onerror="this.style.display='none'">
      </div>

      <div class="divider"></div>

      <div class="nav-area">
        <button id="btn-start" class="nav-btn" onclick="goLink(START_URL, this)">
          <svg class="btn-icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
          <span class="btn-text">첫화면</span>
        </button>

        <button class="nav-btn" onclick="goLink('https://script.google.com/macros/s/AKfycbx8HIJRXzUz3ya8Lfo68J3TbT7CVjETJbnaT2vwcDmpgu7MC0ze8je8iBQ7OS2bp9-nlg/exec', this)">
          <svg class="btn-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
          <span class="btn-text">휴폐업조회</span>
        </button>

        <button class="nav-btn" onclick="goLink('https://tojidi-debug.github.io/home/court_search.html', this)">
          <svg class="btn-icon" viewBox="0 0 24 24"><path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3z"/></svg>
          <span class="btn-text">소송검색</span>
        </button>

        <button class="nav-btn" onclick="goLink('https://script.google.com/macros/s/AKfycbyXGX_HC3_KPPnA2aZGIqAxu9wyh1aeTGp2CBwBDwDHx_YT2trl9r1OeOWOwF-njNwR/exec', this)">
          <svg class="btn-icon" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
          <span class="btn-text">질의회신</span>
        </button>

        <button class="nav-btn" onclick="goLink('https://script.google.com/macros/s/AKfycbxxwFZrlWAnIzGyP2eoG8TCrnbTjKfIoip4wDL6mqSw41_NS4lOwK5Zz23zbecVzxs2Og/exec', this)">
          <svg class="btn-icon" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
          <span class="btn-text">FSS지적</span>
        </button>

        <button class="nav-btn" onclick="goLink('https://script.google.com/macros/s/AKfycbw8s2lGpHf6IbIMuzyO5oOHIL4KLBtraFJKO7zRiCMDiWW8peIes1f0GYRm6IR0pjpBZg/exec', this)">
          <svg class="btn-icon" viewBox="0 0 24 24"><path d="M9 11H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"/></svg>
          <span class="btn-text">KICPA지적</span>
        </button>

        <button class="nav-btn" onclick="goLink('https://script.google.com/macros/s/AKfycbwdcfrZnl1WPDgapy-asAZijutW6vUZRZ7HIndimvuM9Rn0C634JxkcEasmqp_lvooR/exec', this)">
          <svg class="btn-icon" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3z"/></svg>
          <span class="btn-text">전당기협의</span>
        </button>

        <button class="nav-btn" onclick="goLink('https://tojidi-debug.github.io/doyaa1/fsc.html', this)">
          <svg class="btn-icon" viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85z"/></svg>
          <span class="btn-text">금융위조치</span>
        </button>

        <button class="nav-btn" onclick="goLink('https://tojidi-debug.github.io/kicpadb/search.html', this)">
          <svg class="btn-icon" viewBox="0 0 24 24"><path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
          <span class="btn-text">기준서검색</span>
        </button>

        <button class="nav-btn" onclick="goLink('https://tojidi-debug.github.io/doyaa1/dart.html', this)">
          <svg class="btn-icon" viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85z"/></svg>
          <span class="btn-text">감사보고서</span>
        </button>

        <button class="nav-btn" onclick="goLink('https://tojidi-debug.github.io/doyaa3/index.html', this)">
          <svg class="btn-icon" viewBox="0 0 24 24"><path d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1z"/></svg>
          <span class="btn-text">PROMPT</span>
        </button>

        <button class="nav-btn" onclick="goLink('https://script.google.com/macros/s/AKfycbyieDb30eK8mAC0D9Z4sNT91ovmD4iUMcRpC2EmQC5HA5lLG2EYGx3TaRdpInMS94hu/exec', this)">
          <svg class="btn-icon" viewBox="0 0 24 24"><path d="M19 3H5C3.9 3 3 3.9 3 5v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
          <span class="btn-text">포스트잇</span>
        </button>

        <button class="nav-btn" onclick="goLink('https://tojidi-debug.github.io/kicpadb/menu.html', this)">
          <svg class="btn-icon" viewBox="0 0 24 24"><path d="M22 16V4c0-1.1-.9-2-2-2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2z"/></svg>
          <span class="btn-text">이미지보드</span>
        </button>
      </div>

      <div class="han-ai-area">
        <button class="btn-han-ai" onclick="goFullScreen('https://tojidi-debug.github.io/doyaa/ai_index.html')">
          <svg class="btn-icon" viewBox="0 0 24 24"><path d="M20 18c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2H4C2.9 4 2 4.9 2 6v10c0 1.1.9 2 2 2H0v2h24v-2h-4z"/></svg>
          <span class="btn-text">Han_AI</span>
        </button>
      </div>
    </header>

    <div class="content-wrapper">
      <iframe id="content-frame" src="about:blank" referrerpolicy="no-referrer" title="content"></iframe>
    </div>
  </div>

  <div id="custom-alert">
    <div class="modal-content">
      <div class="modal-title">
        <svg class="modal-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>
        시스템 알림
      </div>
      <div id="modal-text" class="modal-message"></div>
      <button class="modal-btn" onclick="closeAlert()">확인</button>
    </div>
  </div>

  <script>
    const START_URL = 'https://script.google.com/macros/s/AKfycbzSMbVs2DMvJmF6NOKfXmxtyK2hx7m3L3fXOS2UtS6tdxiSMTBMnjf4jV_Xs5VHfz0k/exec';

    function resetPage() {
      location.reload();
    }

    function showAlert(msg) {
      document.getElementById('modal-text').innerText = msg;
      document.getElementById('custom-alert').style.display = 'flex';
    }

    function closeAlert() {
      document.getElementById('custom-alert').style.display = 'none';
    }


    function openStartPage() {
      document.body.classList.add('start-mode');
      document.querySelectorAll('.nav-btn').forEach(function(button) {
        button.classList.remove('active');
      });
      const btn = document.getElementById('btn-start');
      if (btn) btn.classList.add('active');
      document.getElementById('content-frame').src = START_URL;
    }

    function goLink(url, el) {
      document.body.classList.remove('start-mode');
      document.getElementById('main-header').classList.remove('hidden');
      document.querySelectorAll('.nav-btn').forEach(function(button) {
        button.classList.remove('active');
      });
      if (el) el.classList.add('active');
      document.getElementById('content-frame').src = url;
    }

    function goFullScreen(url) {
      document.body.innerHTML = '<iframe src="' + escapeHtml(url) + '" style="width:100vw;height:100vh;border:0;display:block;background:#fff;" title="Han_AI" referrerpolicy="no-referrer"></iframe>';
      document.addEventListener('contextmenu', blockContextMenu);
      document.addEventListener('keydown', blockProtectedShortcuts);
    }

    function blockContextMenu(event) {
      event.preventDefault();
      showAlert('보안을 위해 우클릭이 제한됩니다.');
      return false;
    }

    function blockProtectedShortcuts(event) {
      const key = String(event.key || '').toLowerCase();
      const blocked =
        key === 'f12' ||
        (event.ctrlKey && key === 'u') ||
        (event.ctrlKey && key === 's') ||
        (event.ctrlKey && key === 'p') ||
        (event.ctrlKey && event.shiftKey && ['i', 'j', 'c'].indexOf(key) >= 0);

      if (blocked) {
        event.preventDefault();
        event.stopPropagation();
        showAlert('보안을 위해 해당 기능이 제한됩니다.');
        return false;
      }
    }

    function blockSelection(event) {
      event.preventDefault();
      return false;
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    document.addEventListener('contextmenu', blockContextMenu);
    document.addEventListener('keydown', blockProtectedShortcuts);
    document.addEventListener('selectstart', blockSelection);
    document.addEventListener('dragstart', blockSelection);

    window.onload = function() {
      openStartPage();
    };
  </script>
</body>
</html>
