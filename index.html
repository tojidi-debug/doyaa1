
<!DOCTYPE html>
<html lang="ko">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <title>구미호시스템 V2.0</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; }
    body, html { width:100%; height:100%; overflow:hidden; font-family:'Noto Sans KR','Malgun Gothic',sans-serif; }
    .wrapper { width:100%; height:100vh; display:flex; flex-direction:column; }

    header {
      height:58px; flex-shrink:0; z-index:200;
      background:#ffffff;
      border-bottom:2px solid #e2f4f0;
      box-shadow:0 2px 12px rgba(13,148,136,0.08);
      display:flex; align-items:center; padding:0 14px; gap:6px;
    }

    .logo { flex-shrink:0; cursor:pointer; transition:opacity .2s,transform .2s; margin-right:4px; }
    .logo:hover { opacity:.8; transform:scale(1.04); }
    .logo img { height:34px; width:auto; border-radius:7px; object-fit:contain; display:block; }

    .divider { width:1px; height:24px; background:#e2e8f0; flex-shrink:0; }

    .nav-area { display:flex; align-items:center; flex:1; overflow-x:auto; scrollbar-width:none; gap:0; min-width:0; }
    .nav-area::-webkit-scrollbar { display:none; }
    #nav-dynamic { display:flex; align-items:center; gap:0; }
    .grp { display:flex; align-items:center; gap:4px; padding:0 5px; flex-shrink:0; }
    .sep { width:1px; height:20px; background:#d1fae5; flex-shrink:0; }

    /* Base nav button */
    .nb {
      display:inline-flex; align-items:center; gap:5px;
      padding:6px 13px; border-radius:12px; border:1.5px solid;
      font-size:12.5px; font-weight:600; font-family:'Noto Sans KR',sans-serif;
      white-space:nowrap; cursor:pointer; line-height:1; flex-shrink:0;
      transition:transform .15s,box-shadow .15s,background .15s,color .15s,border-color .15s;
      box-shadow:0 1px 4px rgba(0,0,0,0.06);
    }
    .nb:active { transform:translateY(1px) scale(0.93)!important; box-shadow:inset 0 2px 6px rgba(0,0,0,0.14)!important; }
    .nb .nbico { width:11px; height:11px; flex-shrink:0; fill:currentColor; opacity:.85; }

    /* G1 하늘색 */
    .g1 { background:#f0f9ff; border-color:#bae6fd; color:#0369a1; }
    .g1:hover { background:#e0f2fe; border-color:#38bdf8; color:#0284c7; transform:translateY(-2px); box-shadow:0 4px 12px rgba(14,165,233,0.22); }
    .g1.active { background:#0ea5e9; border-color:#0ea5e9; color:#fff; box-shadow:0 3px 12px rgba(14,165,233,0.4); }

    /* G2 시안 */
    .g2 { background:#f0fdfa; border-color:#99f6e4; color:#0f766e; }
    .g2:hover { background:#ccfbf1; border-color:#2dd4bf; color:#0d9488; transform:translateY(-2px); box-shadow:0 4px 12px rgba(20,184,166,0.22); }
    .g2.active { background:#14b8a6; border-color:#14b8a6; color:#fff; box-shadow:0 3px 12px rgba(20,184,166,0.4); }

    /* G3 그린 */
    .g3 { background:#f0fdf4; border-color:#bbf7d0; color:#15803d; }
    .g3:hover { background:#dcfce7; border-color:#4ade80; color:#16a34a; transform:translateY(-2px); box-shadow:0 4px 12px rgba(34,197,94,0.22); }
    .g3.active { background:#22c55e; border-color:#22c55e; color:#fff; box-shadow:0 3px 12px rgba(34,197,94,0.4); }

    /* G4 블루 */
    .g4 { background:#eff6ff; border-color:#bfdbfe; color:#1d4ed8; }
    .g4:hover { background:#dbeafe; border-color:#60a5fa; color:#2563eb; transform:translateY(-2px); box-shadow:0 4px 12px rgba(59,130,246,0.22); }
    .g4.active { background:#3b82f6; border-color:#3b82f6; color:#fff; box-shadow:0 3px 12px rgba(59,130,246,0.4); }

    .right-area { flex-shrink:0; display:flex; align-items:center; gap:6px; padding-left:8px; border-left:1px solid #d1fae5; }
    /* Admin button - HanAI style */
    .btn-admin {
      display:inline-flex; align-items:center; gap:5px;
      padding:7px 16px; border-radius:12px; border:none;
      background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 100%);
      color:#fff; font-size:12px; font-weight:800; font-family:'Noto Sans KR',sans-serif;
      white-space:nowrap; cursor:pointer; line-height:1;
      box-shadow:0 3px 14px rgba(37,99,235,0.35);
      transition:all .2s; animation:haipulse 2.8s ease-in-out infinite;
    }
    .btn-admin svg { width:11px; height:11px; fill:#2dd4bf; }
    .btn-admin:hover { background:linear-gradient(135deg,#0f172a,#1d4ed8); transform:translateY(-2px) scale(1.04); }
    .btn-admin:active { transform:translateY(1px) scale(0.94)!important; }
@keyframes haipulse {
      0%,100%{ box-shadow:0 3px 14px rgba(37,99,235,0.35); }
      50%    { box-shadow:0 5px 22px rgba(37,99,235,0.6); }
    }

    .content-wrapper { flex:1; min-height:0; }
    #content-frame { width:100%; height:100%; border:none; display:block; background:#fff; }

    /* ═══ MODAL BASE ═══ */
    .overlay {
      display:none; position:fixed; inset:0; z-index:3000;
      background:rgba(15,23,42,0.5); backdrop-filter:blur(5px);
      justify-content:center; align-items:center;
    }
    .overlay.show { display:flex; }

    /* Alert */
    .alert-box {
      background:#fff; padding:28px 32px; border-radius:16px; text-align:center;
      border:1.5px solid #d1fae5; box-shadow:0 20px 60px rgba(13,148,136,0.18);
      max-width:340px; min-width:250px;
    }
    .alert-title { font-size:14px; font-weight:700; color:#0d9488; margin-bottom:10px; }
    .alert-msg   { font-size:13px; line-height:1.7; color:#475569; }
    .alert-ok {
      margin-top:16px; padding:9px 26px; border-radius:20px; border:none; cursor:pointer;
      background:linear-gradient(135deg,#0d9488,#0891b2); color:#fff;
      font-weight:700; font-size:13px; font-family:'Noto Sans KR',sans-serif;
      transition:all .18s; box-shadow:0 3px 10px rgba(13,148,136,0.3);
    }
    .alert-ok:hover { transform:translateY(-1px); }

    /* Admin PW modal */
    .pw-box {
      background:#fff; padding:30px 34px; border-radius:16px; text-align:center;
      border:1.5px solid #5eead4; box-shadow:0 20px 60px rgba(13,148,136,0.2);
      min-width:290px;
    }
    .pw-title { font-size:15px; font-weight:700; color:#0d9488; margin-bottom:5px; }
    .pw-sub   { font-size:12px; color:#94a3b8; margin-bottom:18px; }
    .pw-inp {
      width:100%; padding:10px 14px; border:1.5px solid #5eead4; border-radius:10px;
      font-size:16px; text-align:center; letter-spacing:5px; outline:none;
      font-family:monospace; color:#1e293b; background:#f8fffe; transition:border-color .2s;
    }
    .pw-inp:focus { border-color:#0d9488; }
    .pw-err { font-size:11px; color:#ef4444; margin-top:6px; min-height:15px; }
    .pw-row { display:flex; gap:8px; margin-top:14px; }
    .pw-btn {
      flex:1; padding:10px; border-radius:10px; border:none; cursor:pointer;
      font-size:13px; font-weight:700; font-family:'Noto Sans KR',sans-serif; transition:all .18s;
    }
    .pw-btn.ok  { background:linear-gradient(135deg,#0d9488,#0891b2); color:#fff; }
    .pw-btn.ok:hover { transform:translateY(-1px); }
    .pw-btn.no  { background:#f1f5f9; color:#64748b; }
    .pw-btn.no:hover { background:#e2e8f0; }

    /* Admin Panel */
    .admin-box {
      background:#fff; border-radius:16px;
      width:min(860px,96vw); max-height:88vh;
      display:flex; flex-direction:column;
      box-shadow:0 24px 80px rgba(13,148,136,0.2); overflow:hidden;
    }
    .adm-hd {
      padding:16px 22px 12px; border-bottom:1.5px solid #e2e8f0;
      display:flex; align-items:center; justify-content:space-between;
      background:linear-gradient(to right,#f0fdfa,#e6fffe); flex-shrink:0;
    }
    .adm-hd-t { font-size:15px; font-weight:700; color:#0f766e; }
    .adm-hd-s { font-size:11px; color:#64748b; margin-top:2px; }
    .adm-x {
      width:28px; height:28px; border-radius:50%; border:none; cursor:pointer;
      background:#f1f5f9; color:#64748b; font-size:14px;
      display:flex; align-items:center; justify-content:center; transition:all .15s;
    }
    .adm-x:hover { background:#fee2e2; color:#ef4444; }
    .adm-body { overflow-y:auto; flex:1; padding:18px 22px; display:flex; flex-direction:column; gap:18px; }
    .adm-body::-webkit-scrollbar { width:4px; }
    .adm-body::-webkit-scrollbar-thumb { background:#a7f3d0; border-radius:4px; }
    .adm-sec { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:#94a3b8; margin-bottom:8px; padding-bottom:5px; border-bottom:1px solid #f1f5f9; }
    .adm-tbl { width:100%; border-collapse:collapse; }
    .adm-tbl th { text-align:left; padding:5px 8px; font-size:10.5px; font-weight:700; color:#94a3b8; background:#f8fffe; border-bottom:1px solid #e2e8f0; }
    .adm-tbl th:last-child { text-align:center; width:110px; }
    .adm-tbl td { padding:5px 8px; border-bottom:1px solid #f1f5f9; vertical-align:middle; }
    .adm-tbl tr:last-child td { border-bottom:none; }
    .adm-tbl tr:hover td { background:#fafffe; }
    .ai { width:100%; padding:5px 7px; border:1.5px solid #e2e8f0; border-radius:7px; font-size:12px; font-family:'Noto Sans KR',sans-serif; color:#1e293b; outline:none; transition:border-color .2s; -webkit-user-select:text; user-select:text; }
    .ai:focus { border-color:#2dd4bf; }
    .ai.u { font-size:10px; color:#64748b; font-family:monospace,sans-serif; }
    .as { padding:5px 7px; border:1.5px solid #e2e8f0; border-radius:7px; font-size:12px; font-family:'Noto Sans KR',sans-serif; color:#1e293b; outline:none; background:#fff; cursor:pointer; width:100%; }
    .ab { padding:4px 9px; border-radius:6px; border:none; cursor:pointer; font-size:11px; font-weight:600; font-family:'Noto Sans KR',sans-serif; transition:all .15s; }
    .ab.sv { background:#d1fae5; color:#065f46; } .ab.sv:hover { background:#a7f3d0; }
    .ab.dl { background:#fee2e2; color:#dc2626; } .ab.dl:hover { background:#fecaca; }
    .ab-row { display:flex; gap:4px; justify-content:center; }
    .add-f { display:grid; grid-template-columns:120px 1fr 2fr auto; gap:7px; align-items:end; padding:10px 12px; background:#f0fdfa; border-radius:10px; border:1.5px dashed #5eead4; }
    .add-f label { font-size:10px; color:#94a3b8; font-weight:600; margin-bottom:2px; display:block; }
    .add-s { padding:7px 14px; border-radius:8px; border:none; cursor:pointer; background:linear-gradient(135deg,#0d9488,#0891b2); color:#fff; font-size:12px; font-weight:700; font-family:'Noto Sans KR',sans-serif; transition:all .18s; align-self:end; }
    .add-s:hover { transform:translateY(-1px); }
    .pw-f { display:grid; grid-template-columns:1fr 1fr auto; gap:7px; align-items:end; padding:10px 12px; background:#f0fdfa; border-radius:10px; border:1.5px dashed #5eead4; }
    .pw-f label { font-size:10px; color:#94a3b8; font-weight:600; margin-bottom:2px; display:block; }
    .pw-s { padding:7px 14px; border-radius:8px; border:none; cursor:pointer; background:linear-gradient(135deg,#0f766e,#0d9488); color:#fff; font-size:12px; font-weight:700; font-family:'Noto Sans KR',sans-serif; transition:all .18s; align-self:end; }
    .pw-s:hover { transform:translateY(-1px); }
    .rst { padding:7px 14px; border-radius:8px; cursor:pointer; border:none; background:#fee2e2; color:#dc2626; font-size:12px; font-weight:700; font-family:'Noto Sans KR',sans-serif; transition:all .15s; }
    .rst:hover { background:#fecaca; }
    .adm-ft { padding:12px 22px; border-top:1px solid #e2e8f0; display:flex; justify-content:flex-end; gap:8px; background:#fafffe; flex-shrink:0; }
    .adm-close { padding:8px 22px; border-radius:20px; border:none; cursor:pointer; background:linear-gradient(135deg,#0d9488,#0891b2); color:#fff; font-size:13px; font-weight:700; font-family:'Noto Sans KR',sans-serif; transition:all .18s; }
    .adm-close:hover { transform:translateY(-1px); }
    .auth-pending .wrapper,
    .auth-denied .wrapper,
    .auth-pending .overlay,
    .auth-denied .overlay { display:none!important; }
    .auth-screen {
      position:fixed; inset:0; z-index:9999;
      display:flex; align-items:center; justify-content:center;
      background:#ffffff;
      padding:24px; font-family:'Noto Sans KR','Malgun Gothic',sans-serif;
    }
    .auth-ok .auth-screen { display:none; }
    .auth-card {
      width:min(520px,calc(100vw - 40px)); padding:24px 22px 22px;
      background:#fff; border:1px solid #dbeafe; border-radius:12px;
      box-shadow:0 18px 48px rgba(30,64,175,.10); text-align:left;
    }
    .auth-row { display:flex; align-items:center; gap:12px; }
    .auth-label {
      display:inline-flex; align-items:center; gap:8px; flex:0 0 auto;
      color:#2f7ec8; font-size:14px; font-weight:800; white-space:nowrap;
    }
    .auth-label::before {
      content:''; width:10px; height:13px; border-radius:1px;
      background:linear-gradient(180deg,#66c7f4,#3b82f6); box-shadow:inset 0 0 0 1px rgba(255,255,255,.35);
    }
    .auth-input {
      flex:1; height:36px; min-width:0; padding:0 13px;
      border:1.5px solid #a9d5f7; border-radius:5px;
      background:#f4fbff; color:#1e293b; font-size:13px;
      font-family:'Noto Sans KR','Malgun Gothic',sans-serif; outline:none;
      -webkit-user-select:text; user-select:text;
      box-shadow:inset 0 1px 2px rgba(15,23,42,.04);
    }
    .auth-input::placeholder { color:#b6c4d3; }
    .auth-input:focus { border-color:#60a5fa; background:#fff; box-shadow:0 0 0 3px rgba(96,165,250,.16); }
    .auth-actions { display:flex; justify-content:center; gap:8px; margin-top:18px; }
    .auth-btn {
      height:34px; min-width:72px; padding:0 16px; border-radius:7px;
      border:1px solid #bfdbfe; font-size:13px; font-weight:800;
      font-family:'Noto Sans KR','Malgun Gothic',sans-serif; cursor:pointer;
      transition:background .15s, border-color .15s, transform .12s;
    }
    .auth-btn:active { transform:translateY(1px); }
    .auth-btn.primary { background:#2f8edb; border-color:#2f8edb; color:#fff; }
    .auth-btn.primary:hover { background:#1d7fca; border-color:#1d7fca; }
    .auth-btn.secondary { background:#f8fafc; color:#64748b; }
    .auth-btn.secondary:hover { background:#eef6ff; color:#334155; }
    .auth-alert {
      display:none; margin-top:14px; padding:11px 12px; border-radius:8px;
      background:#f8fafc; border:1px solid #dbeafe; color:#475569;
      font-size:13px; line-height:1.55; text-align:center;
    }
    .auth-alert.show { display:block; }
    .auth-alert.denied { background:#fff7f7; border-color:#fecaca; color:#dc2626; }
    @media (max-width:560px) {
      .auth-row { flex-direction:column; align-items:stretch; gap:9px; }
      .auth-label { justify-content:flex-start; }
      .auth-card { padding:22px 18px; }
    }
  </style>
</head>
<body class="auth-pending" oncontextmenu="return false">
<div class="wrapper">

  <header>
    <div class="logo" onclick="goHome()" title="기준서검색 (홈)">
      <img src="https://tojidi-debug.github.io/doyaa1/gumiho.jpg" alt="구미호"
           onerror="this.style.display='none'">
    </div>
    <div class="divider"></div>

    <div class="nav-area">
      <div id="nav-dynamic"></div>
    </div>

    <div class="right-area">
      <button class="btn-admin" onclick="openAdminPw()">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        admin
      </button>
    </div>
  </header>

  <div class="content-wrapper">
    <iframe id="content-frame" src="about:blank" referrerpolicy="no-referrer" title="content"></iframe>
  </div>
</div>

<div id="auth-screen" class="auth-screen">
  <div class="auth-card">
    <div class="auth-row">
      <label class="auth-label" for="auth-email">이메일주소</label>
      <input id="auth-email" class="auth-input" type="email" placeholder="000@gmail.com" autocomplete="email" spellcheck="false">
    </div>
    <div class="auth-actions">
      <button class="auth-btn primary" type="button" onclick="submitEmailAuth()">입력</button>

<!-- Alert -->
<div id="alert-ov" class="overlay">

</div>

<!-- Admin PW -->

    <div class="adm-hd">

        <div class="adm-hd-t">⚙ 관리자 패널</div>

    <div class="adm-body">
      <div>
        <div class="adm-sec">현재 메뉴</div>
        <table class="adm-tbl">
          <thead>
            <tr>
              <th style="width:110px">그룹</th>
              <th style="width:100px">메뉴명</th>
              <th>URL</th>
              <th>작업</th>

          </thead>
          <tbody id="adm-tbody"></tbody>

      </div>

      <div>
        <div class="adm-sec">메뉴 추가</div>
        <div class="add-f">
          <div>
            <label>그룹</label>
            <select id="add-grp" class="as">

        </div>
      </div>
    </div>

    <div class="adm-ft">
      <button class="rst" onclick="resetMenus()">기본값 초기화</button>
      <button class="adm-close" onclick="closeAdmin()">닫기</button>
    </div>
  </div>
</div>

<script>
  /* ─── 이메일 접근 제한 ─── */
  const ALLOWED_EMAILS = [
    'tojidi@gmail.com',
    'kjloveh8@gmail.com',
    'jesussw0410@gmail.com',
    'ohdass12@gmail.com',
  ];
  const AUTH_EMAIL_KEY = 'hanai_allowed_email_v1';
  let AUTH_OK = false;

  function normalizeEmail(value) {
    return String(value || '').trim().toLowerCase();
  }

  function isAllowedEmail(email) {
    return ALLOWED_EMAILS.includes(normalizeEmail(email));
  }

  function setAuthState(allowed, email) {
    AUTH_OK = !!allowed;
    document.body.classList.toggle('auth-ok', AUTH_OK);
    document.body.classList.toggle('auth-denied', !AUTH_OK);
    document.body.classList.remove('auth-pending');
    if (AUTH_OK && email) localStorage.setItem(AUTH_EMAIL_KEY, normalizeEmail(email));
  }

  function showAuthAlert(message, denied) {
    const alert = document.getElementById('auth-alert');
    if (!alert) return;
    alert.textContent = message;
    alert.classList.toggle('denied', !!denied);
    alert.classList.add('show');
  }

  function clearAuthAlert() {
    const alert = document.getElementById('auth-alert');
    if (!alert) return;
    alert.textContent = '';
    alert.classList.remove('show', 'denied');
  }

  function focusAuthInput() {
    const input = document.getElementById('auth-email');
    if (input) setTimeout(() => input.focus(), 40);
  }

  function requestEmailAuth(forcePrompt) {
    const cached = normalizeEmail(localStorage.getItem(AUTH_EMAIL_KEY));
    if (!forcePrompt && cached && isAllowedEmail(cached)) {
      setAuthState(true, cached);
      return true;
    }

    if (forcePrompt) localStorage.removeItem(AUTH_EMAIL_KEY);
    setAuthState(false, '');
    clearAuthAlert();
    focusAuthInput();
    return false;
  }

  function submitEmailAuth() {
    const input = document.getElementById('auth-email');
    const entered = normalizeEmail(input ? input.value : '');
    if (!entered) {
      showAuthAlert('이메일 주소를 입력하세요.', false);
      focusAuthInput();
      return;
    }
    if (isAllowedEmail(entered)) {
      clearAuthAlert();
      setAuthState(true, entered);
      renderNav();
      goHome();
      return;
    }
    localStorage.removeItem(AUTH_EMAIL_KEY);
    setAuthState(false, entered);
    showAuthAlert('접속 불가: 허용된 이메일 목록에 없는 사용자입니다.', true);
    if (input) input.select();
  }

  function cancelEmailAuth() {
    localStorage.removeItem(AUTH_EMAIL_KEY);
    setAuthState(false, '');
    showAuthAlert('접속 불가: 이메일 인증이 취소되었습니다.', true);
  }

  function retryEmailAuth() {
    requestEmailAuth(true);
  }

  document.addEventListener('DOMContentLoaded', () => {
    const input = document.getElementById('auth-email');
    if (input) {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') submitEmailAuth();
        if (e.key === 'Escape') cancelEmailAuth();
      });
    }
    requestEmailAuth(false);
  });
  /* ─── 상수 ─── */
  const HOME_URL = 'https://tojidi-debug.github.io/kicpadb/search.html';
  const VER      = 'v9';   // 버전 올리면 localStorage 자동 초기화

  const GRP = {
    1:{ cls:'g1', lbl:'조회' },
    2:{ cls:'g2', lbl:'지적·협의' },
    3:{ cls:'g3', lbl:'법령·보고서' },
    4:{ cls:'g4', lbl:'도구' },
  };

  /* ─── 아이콘 (SVG path, viewBox 0 0 24 24) ─── */
  const ICONS = {
    1:  'M20 9H4v2h16V9zm-2-4H6v2h12V5zm4 8H2v8h20v-8zm-2 6H4v-4h16v4z',                          // 휴폐업 — 건물
    2:  'M1 21h14v2H1zm5.5-4-1-1 7.06-7.06 1 1zm.93-9.54 1-1 7.07 7.07-1 1zM18 1.31 22.69 6 21 7.69 16.31 3zM4 18H2v2h4z', // 소송 — 망치
    3:  'M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z',                     // 질의회신 — 말풍선
    4:  'M5 9.2h3V19H5zM10.6 5h2.8v14h-2.8zm5.6 8H19v6h-2.8z',                                    // FSS — 차트
    5:  'M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5z',                            // KICPA — 방패
    6:  'M16 11c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 3-1.34 3-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05C16.19 13.55 17 14.52 17 15.5V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z', // 전당기 — 사람들
    7:  'M11.5 2 2 7v2h19V7zm.5 4c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zM4 10v7h3v-7H4zm6 0v7h3v-7h-3zm5 0v7h3v-7h-3zM2 19h19v2H2z', // 금융위 — 은행
    8:  'M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 4h5v8l-2.5-1.5L6 12V4z', // 기준서검색 — 책
    9:  'M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z',                                              // 보고서DOWN — 다운로드
    10: 'M7 2v11h3v9l7-12h-4l4-8z',                                                                // PROMPT — 번개
    11: 'M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z', // 포스트잇
    12: 'M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z', // 이미지보드
    13: 'M12 2a10 10 0 1 0 10 10h-2a8 8 0 1 1-2.34-5.66L15 9h7V2l-2.92 2.92A9.96 9.96 0 0 0 12 2z', // 회생조회
  };

  /* ─── 기본 메뉴 ─── */
  const DEFAULT_MENUS = [
    { id:1,  g:1, name:'휴폐업',     url:'https://script.google.com/macros/s/AKfycbz1E0D17-PeAJlvAjiLeiZh2rzQ2W23SuheSR6nQv_T53N7HgCzq0V_aujW2Rq0E48Ejg/exec' },
    { id:2,  g:1, name:'소송',       url:'https://tojidi-debug.github.io/home/court_search.html' },
    { id:13, g:1, name:'회생조회',   url:'https://script.google.com/macros/s/AKfycbxPPRl9Z2jFukCyURSnUkl-0YIlfREmZ-ftYcki2bLdh7ccPM7Ef6oeRexTLP3um3Ir/exec' },
    { id:3,  g:2, name:'질의회신',   url:'https://script.google.com/macros/s/AKfycbyXGX_HC3_KPPnA2aZGIqAxu9wyh1aeTGp2CBwBDwDHx_YT2trl9r1OeOWOwF-njNwR/exec' },
    { id:4,  g:2, name:'FSS',        url:'https://script.google.com/macros/s/AKfycbxxwFZrlWAnIzGyP2eoG8TCrnbTjKfIoip4wDL6mqSw41_NS4lOwK5Zz23zbecVzxs2Og/exec' },
    { id:5,  g:2, name:'KICPA',      url:'https://script.google.com/macros/s/AKfycbw8s2lGpHf6IbIMuzyO5oOHIL4KLBtraFJKO7zRiCMDiWW8peIes1f0GYRm6IR0pjpBZg/exec' },
    { id:6,  g:2, name:'전당기',     url:'https://script.google.com/macros/s/AKfycbwdcfrZnl1WPDgapy-asAZijutW6vUZRZ7HIndimvuM9Rn0C634JxkcEasmqp_lvooR/exec' },
    { id:7,  g:2, name:'금융위',     url:'https://script.google.com/macros/s/AKfycbwpZ_9dOOiSq_vj7dfx33Lqopw3KKczXCO1ikkVstWME-NVABXDJ_HZ1HxkLOrfo-s7Mw/exec' },
    { id:8,  g:3, name:'기준서 검색', url:'https://tojidi-debug.github.io/kicpadb/search.html' },
    { id:9,  g:4, name:'PDF편집',    url:'https://tojidi-debug.github.io/kicpadb/pdf.html' },
    { id:10, g:4, name:'PROMPT',     url:'https://script.google.com/macros/s/AKfycbzAu3T5GdQVG9KldkOEic0NHDcY-e0O1mjdM3hmPg4ZyO3napv5JJbzBoqFgrKjxqPS/exec' },
    { id:11, g:4, name:'포스트잇',   url:'https://script.google.com/macros/s/AKfycbyieDb30eK8mAC0D9Z4sNT91ovmD4iUMcRpC2EmQC5HA5lLG2EYGx3TaRdpInMS94hu/exec' },
    { id:12, g:4, name:'이미지보드', url:'https://tojidi-debug.github.io/kicpadb/menu.html' },
  ];

  /* ─── localStorage 초기화 (VER 변경 시 menus + 비밀번호 모두 초기화) ─── */
  if (localStorage.getItem('gv') !== VER) {
    localStorage.removeItem('gmenus');
    localStorage.removeItem('gapw');
    localStorage.setItem('gv', VER);
  }

  let menus = JSON.parse(localStorage.getItem('gmenus') || 'null') || cp(DEFAULT_MENUS);
  let apw   = localStorage.getItem('gapw') || '0000';
  let nid   = Math.max(0, ...menus.map(m => m.id)) + 1;

  /* ─── 유틸 ─── */
  function cp(a)  { return a.map(m => ({...m})); }
  function sv()   { localStorage.setItem('gmenus', JSON.stringify(menus)); localStorage.setItem('gapw', apw); }
  function esc(v) { return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }

  /* ─── Nav 렌더링 ─── */
  function renderNav() {
    try {
      const wrap = document.getElementById('nav-dynamic');
      wrap.innerHTML = '';
      let first = true;
      [1,2,3,4].forEach(g => {
        const items = menus.filter(m => m.g === g);
        if (!items.length) return;
        if (!first) { const s = document.createElement('div'); s.className='sep'; wrap.appendChild(s); }
        first = false;
        const grp = document.createElement('div');
        grp.className = 'grp';
        items.forEach(m => {
          const btn = document.createElement('button');
          btn.className   = 'nb ' + GRP[g].cls;
          btn.dataset.mid = m.id;
          const p = ICONS[m.id] || 'M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4z';
          btn.innerHTML   = `<svg class="nbico" viewBox="0 0 24 24"><path d="${p}"/></svg>${esc(m.name)}`;
          btn.onclick     = () => goLink(m.url, btn, m.name);
          grp.appendChild(btn);
        });
        wrap.appendChild(grp);
      });
    } catch(e) { console.error('renderNav:', e); }
  }

  /* ─── 네비게이션 ─── */
  function clearAct() {
    document.querySelectorAll('.nb').forEach(b => b.classList.remove('active'));
  }

  function goHome() {
    clearAct();
    document.getElementById('content-frame').src = HOME_URL;
    const homeMenu = menus.find(m => m.url === HOME_URL);
    if (homeMenu) {
      const btn = document.querySelector('[data-mid="' + homeMenu.id + '"]');
      if (btn) btn.classList.add('active');
    }
  }

  function isAppsScriptUrl(url) {
    try {
      const u = new URL(url);
      return u.hostname === 'script.google.com' && u.pathname.includes('/macros/');
    } catch(e) {
      return false;
    }
  }

  function buildLinkPageUrl(name, url) {
    const launcher = new URL('link.html', window.location.href);
    launcher.searchParams.set('name', name || 'Apps Script');
    launcher.searchParams.set('url', url);
    return launcher.href;
  }

  function goLink(url, el, name) {
    clearAct();
    if (el) el.classList.add('active');

    const frame = document.getElementById('content-frame');
    frame.src = isAppsScriptUrl(url) ? buildLinkPageUrl(name, url) : url;
  }
  /* ─── Admin PW 모달 ─── */
  function openAdminPw() {
    document.getElementById('pw-inp').value = '';
    document.getElementById('pw-err').textContent = '';
    document.getElementById('pw-ov').classList.add('show');
    setTimeout(() => document.getElementById('pw-inp').focus(), 150);
  }
  function closePw() { document.getElementById('pw-ov').classList.remove('show'); }
  function checkPw() {
    const entered = document.getElementById('pw-inp').value;
    if (entered === apw) {
      closePw();
      openAdmin();
    } else {
      document.getElementById('pw-err').textContent = '비밀번호가 올바르지 않습니다.';
      document.getElementById('pw-inp').value = '';
      setTimeout(() => document.getElementById('pw-inp').focus(), 50);
    }
  }
  /* ─── Admin 패널 ─── */
  function openAdmin() {
    renderAdmTbl();
    document.getElementById('np1').value = '';
    document.getElementById('np2').value = '';
    document.getElementById('adm-ov').classList.add('show');
  }
  function closeAdmin() { document.getElementById('adm-ov').classList.remove('show'); }

  function renderAdmTbl() {
    const tb = document.getElementById('adm-tbody');
    tb.innerHTML = '';
    menus.forEach(m => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><select class="as" id="sg${m.id}">${[1,2,3,4].map(g=>`<option value="${g}"${m.g===g?' selected':''}>${GRP[g].lbl}</option>`).join('')}</select></td>
        <td><input class="ai" id="sn${m.id}" type="text" value="${esc(m.name)}"></td>
        <td><input class="ai u" id="su${m.id}" type="text" value="${esc(m.url)}"></td>
        <td><div class="ab-row">
          <button class="ab sv" onclick="saveItem(${m.id})">저장</button>
          <button class="ab dl" onclick="delItem(${m.id})">삭제</button>
        </div></td>`;
      tb.appendChild(tr);
    });
  }

  function saveItem(id) {
    const m = menus.find(x => x.id === id);
    if (!m) return;
    const name = document.getElementById('sn'+id).value.trim();
    const url  = document.getElementById('su'+id).value.trim();
    const g    = parseInt(document.getElementById('sg'+id).value);
    if (!name || !url) { showAlert('메뉴명과 URL을 입력해주세요.'); return; }
    m.name = name; m.url = url; m.g = g;
    sv(); renderNav(); renderAdmTbl();
  }

  function delItem(id) {
    menus = menus.filter(m => m.id !== id);
    sv(); renderNav(); renderAdmTbl();
  }

  function addItem() {
    const name = document.getElementById('add-name').value.trim();
    const url  = document.getElementById('add-url').value.trim();
    const g    = parseInt(document.getElementById('add-grp').value);
    if (!name) { showAlert('메뉴명을 입력해주세요.'); return; }
    if (!url)  { showAlert('URL을 입력해주세요.'); return; }
    menus.push({ id: nid++, g, name, url });
    document.getElementById('add-name').value = '';
    document.getElementById('add-url').value  = '';
    sv(); renderNav(); renderAdmTbl();
  }

  function changePw() {
    const p1 = document.getElementById('np1').value.trim();
    const p2 = document.getElementById('np2').value.trim();
    if (!p1) { showAlert('새 비밀번호를 입력해주세요.'); return; }
    if (p1 !== p2) { showAlert('비밀번호가 일치하지 않습니다.'); return; }
    apw = p1;
    sv();
    document.getElementById('np1').value = '';
    document.getElementById('np2').value = '';
    showAlert('비밀번호가 변경되었습니다.');
  }

  function resetMenus() {
    if (!confirm('메뉴를 기본값으로 초기화하시겠습니까?')) return;
    menus = cp(DEFAULT_MENUS);
    nid   = Math.max(0, ...menus.map(m => m.id)) + 1;
    sv(); renderNav(); renderAdmTbl();
  }

  /* ─── 보안 ─── */
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('keydown', e => {
    const k = String(e.key||'').toLowerCase();
    if (k==='f12' || (e.ctrlKey&&['u','s','p'].includes(k)) || (e.ctrlKey&&e.shiftKey&&['i','j','c'].includes(k))) {
      e.preventDefault(); e.stopPropagation();
    }
  });
  document.addEventListener('selectstart', e => e.preventDefault());
  document.addEventListener('dragstart',   e => e.preventDefault());

  /* ─── 시작 ─── */
  window.onload = function() { if (!AUTH_OK) return; renderNav(); goHome(); };
</script>
</body>
</html>
