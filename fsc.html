years":"","_meetingLinks":{"agenda":"https://www.fsc.go.kr/no020102/85473?srchCtgry=&curPage=2&srchKey=sj&srchText=2025&srchBeginDt=&srchEndDt=","result":"https://www.fsc.go.kr/no020102/85188?srchCtgry=&curPage=3&srchKey=sj&srchText=2025&srchBeginDt=&srchEndDt="},"_agency":"미기재"},{"연도":"2025","회차":"1","위원회":"임시증권선물위원회","의결일":"2025-07-11","회사명":"㈜숲 (구, ㈜아프리카티비)","회사 지적사항":"영업수익 및 영업비용 과대계상(전체)","회사 지적금액":"’21년 11,815백만원, ’22년 25,890백만원","회사 지적대상년도":"2021~2022년","회사 지적내용 상세":"회사는 게임 콘텐츠 광고 개인방송 용역을 주선하는 대리인으로서, 관련 수익을 순액*으로 인식하여야 함에도 총액*으로 인식함에 따라 영업수익 및 영업비용을 과대계상하였음\n* 순액 : 수익과 관련비용을 상계한 후 수익 인식\n* 총액 : 수익과 관련비용을 각각 수익·비용 인식","회사 조치사항":"- 과징금 : 총 15.4억원\n회사 : 14.8억원\n前대표이사 : 0.3억원\n前담당임원 : 0.3억원\n※ 회사 및 회사관계자에 대한 과징금 부과는 향후 금융위원회에서 최종 결정될 예정\n- 감사인지정 3년 (2026.1.1.~2028.12.31.)","감사인":"신우회계법인","감사인 지적사항":"영업수익 및 영업비용 감사절차 소홀(전체)","감사인 지적금액":"회사와 동일","감사인 지적대상년도":"2021~2022년","감사인 지적내용 상세":"감사인은 회사의 영업수익 및 영업비용 회계처리에 대한 감사절차를 소홀히 하여 회사의 회계처리기준 위반사실을 감사의견에 적절히 반영하지 못함","감사인 조치사항":"- 주의\n공인회계사 김윤성 :\n(등록번호 : 10590)\n- 주의\n게임 콘텐츠 광고 매출 측정 방식 (총액법 vs 순액법)\nSOOP은 게임사로부터 광고를 수주하고, 플랫폼 소속 스트리머(BJ)에게 광고 실행 역할을 맡기며 광고비의 약 90%를 스트리머에게 지급하는 구조임. 汫╨다음+2한국경제+2汫h\n문제는 SOOP이 스트리머에게 지급되는 광고비 전체를 ‘매출(광고 매출)’에 포함시킴으로써 매출 규모가 과대 계상됐다는 의혹. 이럴 경우 회사는 단순 중개자(dealer/agent) 역할에 가까운데, 중개자라면 순액법(net basis)으로 수익(즉 중개 수수료만)을 매출로 잡아야 한다는 지적. 汫╨한국경제+3다음+3머니투데이+3汫h\n반대로 SOOP은 계약서 문구 또는 사업구조 실질에 비추어 보면 회사가 단순 중개자보다는 기획·제안·플랫폼 운영·광고 실행 책임(총액법 적용 요건)도 일부 있다는 주장을 함. 汫╨다음+2이데일리+2汫h\n매출 누적 규모 및 기간\n금감원이 조사 중인 광고 부문의 매출액은 연도별로 다음과 같다고 언론에 보도됨:\n2020년 약 20억 원 汫╨이데일리+2서울경제뉴스+2汫h\n2021년 약 120억 원 汫╨네이버 프리미엄 콘텐츠+2서울경제뉴스+2汫h\n2022년 약 270억 원 汫╨네이버 프리미엄 콘텐츠+2다음+2汫h\n2023년 약 40억 원 汫╨서울경제뉴스+2네이버 프리미엄 콘텐츠+2汫h\n2024년 1~3분기 누적 약 110억 원 汫╨네이버 프리미엄 콘텐츠+2서울경제뉴스+2汫h\n계약서 작성 방식과 변경 내역\n조사 대상 기간 동안 계약서 문구가 실질에 맞지 않거나, 스트리머 광고비 지급 구조가 명확히 드러나지 않는 문구들이 존재했다는 지적. 汫╨한국경제+3다음+3이데일리+3汫h\nSOOP 측은 계약서를 2019년부터 보완해왔고, 거래 실질(trade substance)에 맞게 점진적으로 개선해 온 것이라고 주장. 특별한 목적을 가진 ‘꼼수’가 아니라는 입장. 汫╨이데일리+1汫h\n漠杳\nSOOP 측 해명\n매출 부풀릴 동기는 없다: IPO 예정도 없고, 투자 유치 목적도 없으며, 해당 광고 매출이 전체 매출 대비 비중이 낮다는 주장. 汫╨네이버 프리미엄 콘텐츠+1汫h\n회계법인의 판단을 따랐다: 외부감사(회계법인) 과정에서 계약서 일부 문구나 거래 실질을 검토한 결과, 총액법 적용이 타당하다는 판단이 있었다는 주장. 汫╨이데일리+1汫h\n계약서 변경은 자연스러운 보완 과정: 내부적으로 거래 실태를 반영하기 위해 계약서 문구를 수정 ‧ 보완해 온 것이라며, 고의성은 없다고 함. 汫╨이데일리汫h\n漠杳\n제재 및 결과\n증권선물위원회(증선위)가 “숲은 게임 콘텐츠 광고 개인 방송 용역을 주선하는 대리인 역할임에도 광고료 전체를 매출로 인식해 2021~2022년 영업이익을 과대 계상했다”고 판단함. 汫╨뉴스웰+1汫h\n숲과 담당 임원들에게 과징금이 부과됨: 회사에 약 14억 8,000만 원, 전 대표이사와 담당 임원에게 각각 약 3,000만 원씩. 汫╨뉴스웰汫h\n금감원 및 증선위 판단은 중과실수준으로, 고의(fraudulent intent)보다는 ‘판단 과정의 합리성 결여’ 및 회계처리 기준 적용 상 오류가 있었다는 입장. 즉, 중과실로 제재하였다는 것. 汫╨다음+2뉴스웰+2汫h\nSOOP은 자진해서 과거 사업보고서들을 정정하여 광고매출을 총액법에서 순액법 기준으로 재작성함. \n漠杳\n시사점\n짧게 말하면, 숲은 애초에 ‘광고비 전체 → 매출’로 잡는 거(총액법 적용)가 회계 기준 상 적절한지, 그게 광고주와 스트리머 간의 계약 실질 및 역할 분담(플랫폼의 책임, 위험 부담 등)이 실제로 어떠했는지에 달려 있었고, 결국 금융당국은 숲의 처리 방식이 대리인(agent)의 역할에 더 가깝다고 판단한 거예요.\n제재 강도는 고의가 확실히 입증된 건 아니라서 ‘중과실’ 수준으로 낮아졌고, SOOP은 이미 사업보고서를 정정해서 순액법으로 바꿔 놓은 상태라 후속 리스크가 좀 줄어든 상태입니다.","원본파일":"금융위 조치사항 모음 (1).hwp","검토상태":"HWP 원문 구조화","_id":86,"_auditOnly":false,"_subject":"㈜숲 (구, ㈜아프리카티비)","_title":"영업수익 및 영업비용 과대계상(전체)","_years":"2021~2022년","_meetingLinks":{"agenda":"https://www.fsc.go.kr/no020102/85269?srchCtgry=&curPage=3&srchKey=sj&srchText=2025&srchBeginDt=&srchEndDt=","result":"https://www.fsc.go.kr/no020102/84919?srchCtgry=&curPage=3&srchKey=sj&srchText=2025&srchBeginDt=&srchEndDt="},"_agency":"미기재"},{"연도":"2025","회차":"13","위원회":"증권선물위원회","의결일":"2025-07-02","회사명":"㈜STX","회사 지적사항":"종속회사 회계처리 위반 관련 충당부채 등 미계상 및 소송 우발부채 주석공시 누락","회사 지적금액":"’22년 97,572백만원, ’23년 1분기 44,275백만원","회사 지적대상년도":"2022~2023년","회사 지적내용 상세":"회계기준에 따라 소송이 제기되면 재무제표 본문에 충당부채를 반영하거나 주석에 우발부채를 공시하여야 하나\n- 회사는 고의로 해외 소송사건 관련 충당부채 및 우발부채 등이 반영되지 않은 종속회사 재무제표를 사용하여 연결재무제표를 작성·공시함","회사 조치사항":"- 과징금\n※ 회사 및 회사관계자 1인에 대한 과징금 부과는 향후 금융위원회에서 최종 결정될 예정\n- 감사인지정 3년\n(2026.1.1.~2028.12.31.)\n- 대표이사 해임권고 및 직무정지 6월\n- 검찰통보\n(회사, 대표이사)\n- 시정요구","감사인":"","감사인 지적사항":"","감사인 지적금액":"","감사인 지적대상년도":"","감사인 지적내용 상세":"","감사인 조치사항":"","원본파일":"금융위 조치사항 모음 (1).hwp","검토상태":"HW  시 합리적인 근거없이 활성시장의 공시가격에 경영권프리미엄을 가산하여 회수가능액을 추정함에 따라 영업권 등을 과대계상한 사실이 있음\n※ 증권선물위원회 의결 내용\n□종속기업 주식이 거래소에 상장되어 있는 경우 회계기준상 종속기업투자주식의 회계단위는 개별단위주식 또는 전체투자주식 중 선택 가능하며 회사가 채택한 회계정책을 주석에 공시해야함\n(회계기준원 질의회신 2019 - I - KQA016 참고)\n◦종속기업투자주식 손상평가 시 개별단위주식으로 회계단위를 선택했다면 활성시장 공시가격 사용\n◦전체투자주식으로 회계단위를 선택했다면 경영권프리미엄을 고려하여 사용가치 평가 가능\n(다만, 경영권프리미엄의 산정근거 등이 객관적이고 신뢰가능해야함)\n⇨㈜코너스톤네트웍스는 ➊전체투자주식으로 회계단위를 선택하였음에도 회계정책을 주석에 공시하지 않았으며, ➋활성시장 공시가격에 산정근거가 객관적이지 못한 경영권프리미엄을 가산하여 평가함으로써 회계기준을 위반하였다고 판단","회사 조치사항":"- 증권발행제한 6월\n- 과징금\n(前 대표이사 10백만원)\n- 과태료\n(회사 72백만원)\n- 감사인지정 2년\n(2023.1.1.∼2024.12.31.)\n※담당임원해임권고 조치와 관련하여 이미 퇴사하였으므로 퇴직자 위법사실 통지로 갈음","감사인":"","감사인 지적사항":"","감사인 지적금액":"","감사인 지적대상년도":"","감사인 지적내용 상세":"","감사인 조치사항":"","원본파일":"금융위 조치사항 모음 (1).hwp","검토상태":"HWP 원문 구조화","_id":280,"_auditOnly":false,"_subject":"(구, ㈜이디)","_title":"영업권(종속기업투자주식) 과대계상","_years":"2016년","_meetingLinks":{"agenda":"https://www.fsc.go.kr/no020102/77765?srchCtgry=&curPage=8&srchKey=sj&srchText=2022&srchBeginDt=&srchEndDt=","result":"https://www.fsc.go.kr/no020102/77492?srchCtgry=&curPage=10&srchKey=sj&srchText=2022&srchBeginDt=&srchEndDt="},"_agency":"금융감독원 회계심사국"},{"연도":"2022","회차":"5","위원회":"증권선물위원회","의결일":"2022-03-10","회사명":"(구, ㈜이디)","회사 지적사항":"특수관계자거래 주석 미기재","회사 지적금액":"’16년 별도 : 34,364백만원, 연결 : 4,660백만원, ’17년 별도 : 7,710백만원, 연결 : 14,729백만원, ’18년 별도 및 연결 : 24,794백만원","회사 지적대상년도":"2016~2018년","회사 지적내용 상세":"- 회사는 특수관계자와 자금거래 등이 존재하였음에도 주석에 해당 내용을 기재하지 않은 사실이 있음","회사 조치사항":"- 증권발행제한 6월\n- 과징금\n(前 대표이사 10백만원)\n- 과태료\n(회사 72백만원)\n- 감사인지정 2년\n(2023.1.1.∼2024.12.31.)\n※담당임원해임권고 조치와 관련하여 이미 퇴사하였으므로 퇴직자 위법사실 통지로 갈음","감사인":"","감사인 지적사항":"","감사인 지적금액":"","감사인 지적대상년도":"","감사인 지적내용 상세":"","감사인 조치사항":"","원본파일":"금융위 조치사항 모음 (1).hwp","검토상태":"HWP 원문 구조화","_id":281,"_auditOnly":false,"_subject":"(구, ㈜이디)","_title":"특수관계자거래 주석 미기재","_years":"2016~2018년","_meetingLinks":{"agenda":"https://www.fsc.go.kr/no020102/77765?srchCtgry=&curPage=8&srchKey=sj&srchText=2022&srchBeginDt=&srchEndDt=","result":"https://www.fsc.go.k 102/75319?srchCtgry=&curPage=11&srchKey=sj&srchText=2021&srchBeginDt=&srchEndDt="},"_agency":"금융감독원 회계심사국"},{"연도":"2021","회차":"1","위원회":"임시증권선물위원회","의결일":"2021-01-26","회사명":"대한전선㈜","회사 지적사항":"매출채권 등에 대한 대손충당금 과소계상","회사 지적금액":"’12년 별도: 211,470백만원, 연결: 214,717백만원","회사 지적대상년도":"2011~2012년","회사 지적내용 상세":"회사는 OOO에 대한 채권과 관련하여, OOO가 잉여영업현금흐름을 창출할 만한 영업을 영위하고 있지 않고, 완전 자본잠식 상태이며, 회사의 채권 상환 목적 자금을 다른 용도(이자비용 및 차입금 상환)로 이용하는 등 실질적으로 채무상환능력이 없었음에도\n회사는 그 회수가능액을 과대평가함으로써 대손충당금을 과소계상함\n※ 재조치 이유\n1. 원조치(금융위원회 ’14.12.24. 의결)\n□금융위원회는 ’14.12.24. 대한전선㈜의 ’11년 및 ’12년 사업보고서 및 연결감사보고서 등에 대한 조사·감리결과\n◦’11년 및 ’12년 사업보고서 등 정기보고서 거짓기재 및 증권신고서 거짓기재(’12.9.25.)를 이유로 과징금 20억원을 부과처분함\n2. 법원의 취소판결\n(서울고등법원 ’20.7.22.선고 2019누37020판결)\n□법원은 대한전선㈜이 제기한 과징금 부과처분 취소소송에서 대한전선㈜의 ’11년 위반행위는 지적사항으로 인정되지 않고, ’12년 위반행위만 지적사항으로 인정된다고 판시하면서\n◦대한전선㈜에 대한 금융위원회의 과징금 부과처분(’14.12.24.)을 전부 취소함\n3. 재조치 실시\n□법원의 판결로 인정된 ’12년 지적사항에 근거하여 위반행위에 상응하는 ‘증권발행제한 10월’로 재조치를 실시하는 것이며\n⇒원조치 시 지적사항과 동일한 사항을 지적·조치하는 것으로 새로운 조치를 부과하는 것이 아님","회사 조치사항":"- 증권발행제한 10월","감사인":"","감사인 지적사항":"","감사인 지적금액":"","감사인 지적대상년도":"","감사인 지적내용 상세":"","감사인 조치사항":"","원본파일":"금융위 조치사항 모음 (1).hwp","검토상태":"HWP 원문 구조화","_id":326,"_auditOnly":false,"_subject":"대한전선㈜","_title":"매출채권 등에 대한 대손충당금 과소계상","_years":"2011~2012년","_meetingLinks":{"agenda":"https://www.fsc.go.kr/no020102/75619?srchCtgry=&curPage=10&srchKey=sj&srchText=2021&srchBeginDt=&srchEndDt=","result":"https://www.fsc.go.kr/no020102/75319?srchCtgry=&curPage=11&srchKey=sj&srchText=2021&srchBeginDt=&srchEndDt="},"_agency":"금융감독원 회계조사국 / 금융감독원 회계심사국"},{"연도":"2021","회차":"1","위원회":"임시증권선물위원회","의결일":"2021-01-26","회사명":"(구, ㈜대유위니아)","회사 지적사항":"매출액 및 매출원가 과대계상","회사 지적금액":"'15년 23,694백만원, ’16년 10,784백만원, ’17년 15,051백만원, ’18년1분기 15,111백만원, ’18년반기 16,257백만원, ’18년3분기 17,581백만원","회사 지적대상년도":"2015~2018년","회사 지적내용 상세":"- 회사는 ➊전문점 보유 미판매제품 재고를 직접 관리하면서 반품 또는 교환되는 제품을 회사의 전산시스템에서 임의로 조정하거나, ➋회사가 전문점의 제품매입대금 상환의무를 면제한 뒤에도 이미 인식한 매출액을 환입하지 않거나, ➌과다인식한 매출액 중 일부를 차기 이후에 부당환입하는 등의 방법으로 매출액 및 매출원가를 과대계상한 사실이 있음","회사 백만원,\n’13년 39,642백만원, ’14년 232,735백만원,\n’15년 356,152백만원, ’16년 291,833백만원,\n’17년 677,458백만원)\n- 회사는 다음과 같이 회계처리기준을 위반하여 관련 계정과목 및 유동성 분류를 잘못한 사실이 있음\n- (매출채권 등 유동성 분류 오류) 결산일로부터 12개월 이내 실현되기 어려운 채권의 경우 비유동자산으로 분류하여야 함에도, 회사는 매출채권 및 기타채권에 대해 관계 회사와 회수기일의 연장에 합의한 바 없어, 계약서상 명시된 회수기일을 기준으로 유동자산으로 분류\n- (MMT 계정분류 오류) 특정금전신탁(MMT)의 구성자산을 회사가 직접 보유한 것처럼 회계처리하여야 함에도, 회사는 특정금전신탁(MMT)에 대해 실질적으로 직접 운영지시를 하지 않았고, 그 경제적 실질이 일반예금과 동일하다고 판단하여 현금성자산으로 분류\n- (유형자산의 투자부동산 분류 오류) 장래 용도를 결정하지 못한 채 보유하고 있는 토지는 시세차익을 얻기 위하여 보유하는 것으로 간주하여 ‘투자부동산’으로 분류하여야 함에도, 회사는 ’17년말 현재 빌딩을 건축중인 부동산에 대해 향후의 정확한 자가사용 비율과 임대비율을 추정하기 곤란하다는 이유로 ‘유형자산‘으로 계상\n- (재고자산 미착품 인식 오류) CIF조건으로 수입한 재고자산은 선적일을 기준으로 인식해야 함에도, 회사는 ’17년말 매입처로부터 선적서류를 수취한 미착품에 대해 재고자산 인식을 누락\n- (재고자산의 유형자산 대체 오류) 재화의 생산 등에 사용할 목적으로 보유하는 물리적 형태가 있고 한 회계기간을 초과하여 사용할 것으로 예상되는 자산은 유형자산으로 인식하여야 함에도, 회사는 노후 기계장치에 소모성 부품을 교체하여 그 수명을 연장한 기계장치를 재고자산으로 분류 \n- (투자부동산의 유형자산 분류 오류) 종속기업에 임대하는 부동산은 연결 실체관점에서 자가사용 목적의 부동산으로 보아 유형자산으로 인식하여야 함에도, 회사는 종속기업에 건물·토지를 임대하고 해당 부동산에 대해 연결재무제표에서 임대목적 투자부동산으로 분류\n- (기타부채의 유동성 대체 오류) 비유동부채 중 결산일로부터 1년 이내에 실현될 것으로 예상되는 부분은 유동부채로 대체하여야 함에도, 연결재무제표에서 종속기업이 인식한 복구충당부채, 마일리지 이연수익 및 반품충당부채 전체를 비유동부채로 계상","회사 조치사항":"- 증권발행제한 2월\n- 감사인지정 1년\n(2021.1.1.∼2021.12.31.)\n- 시정요구\n- 내부통제 개선권고","감사인":"","감사인 지적사항":"","감사인 지적금액":"","감사인 지적대상년도":"","감사인 지적내용 상세":"","감사인 조치사항":"","원본파일":"금융위 조치사항 모음 (1).hwp","검토상태":"HWP 원문 구조화","_id":363,"_auditOnly":false,"_subject":"㈜케이티앤지","_title":"계정 분류 오류","_years":"2011~2017년","_meetingLinks":{"agenda":"https://www.fsc.go.kr/no020101/28407?srchCtgry=&curPage=2&srchKey=sj&srchText=2020&srchBeginDt=&srchEndDt=","result":"https://www.fsc.go.kr/no020101/28392?srchCtgry=&curPage=4&srchKey=sj&srchText=2020&srchBeginDt=&srchEndDt="},"_agency":"금융감독원 회계조사국"},{"연도":"2020","회차":"16","위원회":"금융위원회","의결일":"2020-09-09","회사명":"한솔인티큐브㈜","회사 지적사항":"매출 및 매출원가 과대·과소 계상","회사 지적금액":"’14년: 6,858백만원, ’15년: 11,524백만원, ’16년: △13,722백만원, ’17년 1분기: △733백만원, ’17년 반기: △1,889백만원, ’17년 3분기: △919백만원","회사 지적대상년도":"2014~2017년","  7,473백만원, ’17년 7,473백만원)\n- 감사인은 회사가 보유한 투자주식이 관계기업투자에 해당하는지 판단할 때 형식적 지분율 요건만 고려하고 다른 유의적인 영향력 요건(대표이사 겸직 등)에 대한 검토를 소홀히 하여 회사의 회계처리 위반을 감사의견에 적절히 반영하지 못함","감사인 조치사항":"","원본파일":"금융위 조치사항 모음 (1).hwp","검토상태":"HWP 원문 구조화","_id":414,"_auditOnly":false,"_subject":"㈜한일진공","_title":"파생상품자산 과소계상 등","_years":"2016~2018년","_meetingLinks":{"agenda":"https://www.fsc.go.kr/no020102/75393?srchCtgry=&curPage=2&srchKey=sj&srchText=2020&srchBeginDt=&srchEndDt=","result":"https://www.fsc.go.kr/no020102/29237?srchCtgry=&curPage=4&srchKey=sj&srchText=2020&srchBeginDt=&srchEndDt="},"_agency":"미기재"},{"연도":"2020","회차":"2","위원회":"증권선물위원회","의결일":"2020-01-22","회사명":"한국전력기술㈜","회사 지적사항":"미수금 과대계상 등","회사 지적금액":"’15년 21,155백만원","회사 지적대상년도":"2015~2016년","회사 지적내용 상세":"발주처가 부과한 지체상금에 대하여 하도급사가 계약위반 및 손해배상 책임을 부인하고, 관련 중재가 진행되는 등 하도급사의 변제가 ‘거의 확실(Virtually certain)’하지 않음에도 \n- 회사는 지체상금 부담으로 인한 공사손실을 취소하고 변제예상금액 21,155백만원을 미수금으로 인식함에 따라 ’15년 당기순이익을 과대계상하였고, \n- ’16년에는 전기오류를 수정하지 않고, 중재판정에 따라 당기에 손해배상비 등으로 처리(관련 미수금 제거)하여 당기순이익을 21,155백만원 과소계상한 사실이 있음","회사 조치사항":"- 과징금 286.1백만원 \n- 감사인지정 2년\n(2021.1.1.∼2022.12.31.)\n- 시정 요구","감사인":"","감사인 지적사항":"","감사인 지적금액":"","감사인 지적대상년도":"","감사인 지적내용 상세":"","감사인 조치사항":"","원본파일":"금융위 조치사항 모음 (1).hwp","검토상태":"HWP 원문 구조화","_id":415,"_auditOnly":false,"_subject":"한국전력기술㈜","_title":"미수금 과대계상 등","_years":"2015~2016년","_meetingLinks":{"agenda":"https://www.fsc.go.kr/no020102/75393?srchCtgry=&curPage=2&srchKey=sj&srchText=2020&srchBeginDt=&srchEndDt=","result":"https://www.fsc.go.kr/no020102/29237?srchCtgry=&curPage=4&srchKey=sj&srchText=2020&srchBeginDt=&srchEndDt="},"_agency":"미기재"},{"연도":"2020","회차":"2","위원회":"증권선물위원회","의결일":"2020-01-22","회사명":"한국전력기술㈜","회사 지적사항":"매출원가 과소 및 과대계상","회사 지적금액":"’16년 14,818백만원","회사 지적대상년도":"2016~2017년","회사 지적내용 상세":"회사는 설계용역이 달성되는 정도를 진행률로 하여 매출 및 매출원가를 인식함에 있어서 발생원가가 예정원가를 초과하는 등 예정원가 오류 사업들이 다수 발생함에 따라 \n- ’16년에 매출원가를 14,818백만원 과소계상하였고 ’17년에는 전기오류를 당기에 반영하여 매출원가를 14,818백만원 과대계상한 사실이 있음\n감사인 및 공인회계사】","회사 조치사항":"- 과징금 286.1백만원 \n- 감사인지정 2 function hi(value){const source=String(value||'—');if(!state.terms.length)return esc(source);const unique=[...new Set(state.terms)].sort((a,b)=>b.length-a.length),rx=new RegExp(unique.map(t=>t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|'),'giu');let out='',at=0;for(const m of source.matchAll(rx)){out+=esc(source.slice(at,m.index))+'<mark>'+esc(m[0])+'</mark>';at=m.index+m[0].length}return out+esc(source.slice(at))}
function categoryMatch(r){if(state.category==='sfc')return r['위원회'].includes('증권선물위원회');if(state.category==='fsc')return r['위원회']==='금융위원회';if(state.category==='audit')return r._auditOnly;return true}function search(){state.terms=terms(q.value.trim());const keyword=state.terms.length?DATA.filter(r=>state.mode==='AND'?state.terms.every(t=>r._search.includes(t)):state.terms.some(t=>r._search.includes(t))):DATA;state.filtered=keyword.filter(categoryMatch);state.page=1;state.expanded=null;render()}
function facts(r,prefix){const company=prefix==='회사',title=r[prefix+' 지적사항'],amount=r[prefix+' 지적금액'],target=r[prefix+' 지적대상년도'],description=r[prefix+' 지적내용 상세'],action=r[prefix+' 조치사항'];if(![title,amount,target,description,action].some(Boolean))return'<p class="label">해당 정보 없음</p>';return`<dl class="facts">${!company&&r['감사인']?`<dt>감사인</dt><dd>${hi(r['감사인'])}</dd>`:''}<dt>지적사항</dt><dd>${hi(title)}</dd><dt>지적금액</dt><dd>${hi(amount)}</dd><dt>대상년도</dt><dd>${hi(target)}</dd><dt>상세내용</dt><dd>${hi(description)}</dd><dt>조치사항</dt><dd class="action">${hi(action)}</dd></dl>`}
function detail(r){const links=r._meetingLinks||{};const items=[];if(links.result)items.push(`<a href="${esc(links.result)}" target="fscDecisionWindow" title="회의결과 새 창에서 보기">회의결과</a>`);if(links.agenda)items.push(`<a href="${esc(links.agenda)}" target="fscDecisionWindow" title="안건 새 창에서 보기">안건</a>`);const agency=((r._agency||'').trim()&&((r._agency||'').trim()!=='미기재'))?(r._agency||'').trim():'(미기재)';return`<div class="detailwrap ${state.expanded===r._id?'open':''}"><div class="clip"><div class="detail"><div class="detailgrid"><section class="detailsec"><h3><span class="symbol">C</span>회사 지적 및 조치</h3>${facts(r,'회사')}</section><section class="detailsec auditsec"><h3><span class="symbol">A</span>감사인 지적 및 조치</h3>${facts(r,'감사인')}</section></div><div class="source originline"><strong>조치기관 :</strong><span>${hi(agency)}</span><strong>원문 :</strong><span class="originlinks">${items.join('')}</span></div></div></div></div>`}function meetingLinks(r){const links=r._meetingLinks||{},items=[];if(links.result)items.push(`<a href="${esc(links.result)}" target="fscDecisionWindow" title="회의결과 새 창에서 보기">회의결과</a>`);if(links.agenda)items.push(`<a href="${esc(links.agenda)}" target="fscDecisionWindow" title="안건 새 창에서 보기">안건</a>`);return`<span class="meetinglinks">${items.join('')}</span>`}function row(r){const open=state.expanded===r._id;return`<article class="item"><div class="rowwrap"><button class="row" data-id="${r._id}" aria-expanded="${open}"><span class="year">${esc(r['연도'])}</span><span class="round">제${esc(r['회차'])}차</span><span class="committee">${esc(committee(r['위원회']))}</span><span class="decisiondate">${date(r['의결일'])}</span><span class="subject"><span class="subjectline">${hi(r._subject)}${r._auditOnly?'<em class="badge">감사인 단독조치</em>':''}</span></span><span class="years">${years(r._years)}</span><span class="title">${hi(r._title)}</span><span class="linkslot"></span><svg class="chev" viewBox="0 0 24 24"><path fill="currentColor" d="m7.4 8.6 4.6 4.6 4.6-4.6L18 10l-6 6-6-6 1.4-1.4Z"/></svg></button>${meetingLinks(r)}</div>${detail(r)}</article>`}
function tokens(now,total){if(total<=7)return Array.from({length:total},(_,i)=>i+1);const a=[...new Set([1,total,now-2,now-1,now,now+1,now+2].filter(n=>n>0&&n<=total))].sort((a,b)=>a-b),out=[];a.forEach((n,i)=>{if(i&&n-a[i-1]>1)out.push('…');out.push(n)});return out}function renderPages(total){if(total<=1){pages.innerHTML='';return}const prev=state.page===1?'disabled':'',next=state.page===total?'disabled':'',nums=tokens(state.page,total).map(n=>n==='…'?'<span class="gap">…</span>':`<button class="page ${n===state.page?'current':''}" data-page="${n}" ${n===state.page?'aria-current="page"':''}>${n}</button>`).join('');pages.innerHTML=`<button class="page" data-page="1" ${prev}>첫페이지</button><button class="page" data-page="${state.page-1}" ${prev}>이전</button>${nums}<button class="page" data-page="${state.page+1}" ${next}>다음</button><button class="page" data-page="${total}" ${next}>마지막페이지</button><div class="status">${state.page} / ${total} 페이지 · 페이지당 ${SIZE}건</div>`}
function render(){const total=Math.max(1,Math.ceil(state.filtered.length/SIZE));state.page=Math.min(state.page,total);const shown=state.filtered.slice((state.page-1)*SIZE,state.page*SIZE),filterName={all:'',sfc:'증선위',fsc:'금융위',audit:'감사인조치'}[state.category];document.getElementById('count').textContent=state.filtered.length.toLocaleString('ko-KR')+'건';document.getElementById('label').textContent=(state.terms.length?state.mode+' 검색 결과':'전체 조치사항 · 최신순')+(filterName?' · '+filterName:'');list.innerHTML=shown.length?shown.map(row).join(''):'<div class="empty"><strong>일치하는 조치사항이 없습니다.</strong>키워드를 줄이거나 다른 구분을 선택해보세요.</div>';renderPages(total)}
document.querySelectorAll('.mode').forEach(b=>b.addEventListener('click',()=>{state.mode=b.dataset.mode;document.querySelectorAll('.mode').forEach(x=>x.setAttribute('aria-pressed',String(x===b)));if(q.value.trim())search()}));document.querySelectorAll('.filter').forEach(b=>b.addEventListener('click',()=>{state.category=b.dataset.filter;document.querySelectorAll('.filter').forEach(x=>x.setAttribute('aria-pressed',String(x===b)));search()}));document.getElementById('go').addEventListener('click',search);document.getElementById('clear').addEventListener('click',()=>{q.value='';state.mode='AND';state.category='all';document.querySelectorAll('.mode').forEach(x=>x.setAttribute('aria-pressed',String(x.dataset.mode==='AND')));document.querySelectorAll('.filter').forEach(x=>x.setAttribute('aria-pressed',String(x.dataset.filter==='all')));search();q.focus()});q.addEventListener('keydown',e=>{if(e.key==='Enter')search()});list.addEventListener('click',e=>{const b=e.target.closest('.row');if(!b)return;const id=Number(b.dataset.id);state.expanded=state.expanded===id?null:id;render();if(state.expanded)requestAnimationFrame(()=>document.querySelector(`[data-id="${id}"]`)?.focus({preventScroll:true}))});pages.addEventListener('click',e=>{const b=e.target.closest('[data-page]');if(!b||b.disabled)return;state.page=Number(b.dataset.page);state.expanded=null;render();document.querySelector('main').scrollIntoView({behavior:'smooth'})});search();</script></body></html>
