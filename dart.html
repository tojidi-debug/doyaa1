<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>DART 감사보고서 다운로더</title>

<style>
*, *::before, *::after {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html, body {
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#f0f4f8;
  font-family:'Malgun Gothic','Noto Sans KR',sans-serif;
  user-select:none;
}

.card {
  background:#fff;
  border-radius:24px;
  padding:40px 44px 36px;
  width:390px;
  box-shadow:0 8px 36px rgba(0,0,0,.12);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
  text-align:center;
}

.logo {
  width:64px;
  height:64px;
  background:linear-gradient(135deg,#0d9488,#0891b2);
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  font-weight:900;
  color:#fff;
}

.title {
  font-size:17px;
  font-weight:800;
  color:#0f172a;
}

.question {
  font-size:14px;
  color:#475569;
  line-height:1.7;
  padding:14px 18px;
  background:#f8fafc;
  border-radius:12px;
  border:1.5px solid #e2e8f0;
  width:100%;
}

.btns {
  display:flex;
  flex-direction:row;
  gap:8px;
  width:100%;
}

.btn-yes,
.btn-run,
.btn-no {
  flex:1;
  padding:10px 6px;
  border-radius:10px;
  font-size:13px;
  font-weight:800;
  cursor:pointer;
  font-family:inherit;
  transition:all .18s;
  white-space:nowrap;
}

.btn-yes {
  background:linear-gradient(135deg,#0d9488,#059669);
  color:#fff;
  border:none;
}

.btn-run {
  background:linear-gradient(135deg,#2563eb,#0891b2);
  color:#fff;
  border:none;
}

.btn-no {
  background:#f1f5f9;
  color:#64748b;
  border:1.5px solid #e2e8f0;
}

.btn-yes:hover,
.btn-run:hover {
  transform:translateY(-2px);
}

.btn-no:hover {
  background:#e2e8f0;
}

.hint {
  font-size:11px;
  color:#94a3b8;
  line-height:1.6;
}

.hint a {
  color:#0d9488;
  text-decoration:none;
}

.hint a:hover {
  text-decoration:underline;
}

/* 알림창 배경 */
.modal-bg {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.35);
  align-items:center;
  justify-content:center;
  z-index:9999;
}

/* 알림창 */
.modal {
  width:340px;
  background:#fff;
  border-radius:22px;
  padding:28px 28px 24px;
  box-shadow:0 18px 60px rgba(15,23,42,.22);
  text-align:center;
  animation:pop .18s ease-out;
}

@keyframes pop {
  from {
    opacity:0;
    transform:translateY(8px) scale(.96);
  }
  to {
    opacity:1;
    transform:translateY(0) scale(1);
  }
}

.modal-icon {
  width:54px;
  height:54px;
  margin:0 auto 16px;
  border-radius:16px;
  background:linear-gradient(135deg,#0d9488,#0891b2);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  font-weight:900;
}

.modal-title {
  font-size:17px;
  font-weight:900;
  color:#0f172a;
  margin-bottom:10px;
}

.modal-text {
  font-size:14px;
  color:#475569;
  line-height:1.7;
  margin-bottom:22px;
}

.modal-buttons {
  display:flex;
  gap:10px;
}

.modal-yes,
.modal-no {
  flex:1;
  padding:11px 8px;
  border-radius:12px;
  font-size:14px;
  font-weight:800;
  cursor:pointer;
  font-family:inherit;
}

.modal-yes {
  border:none;
  color:#fff;
  background:linear-gradient(135deg,#0d9488,#059669);
}

.modal-no {
  border:1.5px solid #e2e8f0;
  color:#64748b;
  background:#f8fafc;
}

@media (max-width:430px) {
  .card {
    width:92%;
    padding:34px 24px 30px;
  }

  .btn-yes,
  .btn-run,
  .btn-no {
    font-size:12px;
    padding:9px 4px;
  }

  .modal {
    width:86%;
  }
}
</style>
</head>

<body>

<div class="card">
  <div class="logo">D</div>

  <div class="title">DART 감사보고서 다운로더</div>

  <div class="question" id="qBox">
    🔌 서버를 시작하거나 다운로더 폴더를 열 수 있습니다.
  </div>

  <div class="btns" id="btnBox">
    <button class="btn-yes" onclick="launchServer()">서버 시작</button>
    <button class="btn-run" onclick="showFolderModal()">다운로더 실행</button>
    <button class="btn-no" onclick="goNo()">아니오</button>
  </div>

  <div class="hint" id="hint">
    서버가 이미 실행 중이면 <a href="http://localhost:5000/" target="_self">여기를 클릭</a>하세요
  </div>
</div>

<!-- 깔끔한 확인 알림창 -->
<div class="modal-bg" id="folderModal">
  <div class="modal">
    <div class="modal-icon">📂</div>
    <div class="modal-title">폴더 열기</div>
    <div class="modal-text">
      해당 폴더 새 창을 오픈할까요?
    </div>
    <div class="modal-buttons">
      <button class="modal-yes" onclick="openFolder()">예</button>
      <button class="modal-no" onclick="closeFolderModal()">아니오</button>
    </div>
  </div>
</div>

<script>
const APP = 'http://localhost:5000/';

// 열 폴더 경로
const FOLDER_URL = 'file:///C:/Users/KICPA/Claude/Projects/%EA%B0%90%EC%82%AC%EB%B3%B4%EA%B3%A0%EC%84%9C%20%EB%8B%A4%EC%9A%B4/';

function launchServer() {
  window.location.href = 'dart-launcher://';
  setTimeout(function() {
    window.location.href = APP;
  }, 2000);
}

function showFolderModal() {
  document.getElementById('folderModal').style.display = 'flex';
}

function closeFolderModal() {
  document.getElementById('folderModal').style.display = 'none';
}

function openFolder() {
  closeFolderModal();

  // 새 창으로 폴더 열기
  window.open(FOLDER_URL, '_blank');
}

function goNo() {
  // 아무 이벤트 없음
}

// 오른쪽 마우스 금지
document.addEventListener('contextmenu', function(e) {
  e.preventDefault();
});

// 드래그 방지
document.addEventListener('dragstart', function(e) {
  e.preventDefault();
});

// 소스보기 / 개발자도구 단축키 일부 차단
document.addEventListener('keydown', function(e) {
  const key = e.key.toLowerCase();

  if (
    e.key === 'F12' ||
    (e.ctrlKey && key === 'u') ||
    (e.ctrlKey && e.key === 's') ||
    (e.ctrlKey && e.shiftKey && ['i', 'j', 'c'].includes(key))
  ) {
    e.preventDefault();
    return false;
  }

  if (e.key === 'Escape') {
    closeFolderModal();
  }
});
</script>

</body>
</html>
