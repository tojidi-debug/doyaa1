<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>DART 감사보고서 다운로더</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: #f0f4f8;
  font-family: 'Malgun Gothic', 'Noto Sans KR', sans-serif;
  gap: 18px;
}

.logo {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, #0d9488, #0891b2);
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
}
.logo span { color: #fff; font-size: 30px; font-weight: 800; }
h1 { font-size: 20px; font-weight: 800; color: #0f172a; }

.box {
  background: #fff; border-radius: 12px;
  padding: 18px 24px; width: 100%; max-width: 420px;
  box-shadow: 0 2px 12px rgba(0,0,0,.08);
  border: 1.5px solid #e2f4f0;
}
.box-title {
  font-size: 12px; font-weight: 700; color: #0d9488;
  margin-bottom: 10px;
}
.box p { font-size: 12.5px; color: #475569; line-height: 1.8; }
.box p b { color: #0f172a; }
.box p code {
  background: #f1f5f9; border-radius: 4px;
  padding: 1px 6px; font-size: 11.5px; color: #0d9488;
  font-family: 'Consolas', monospace;
}

.status {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 8px;
  font-size: 12px; font-weight: 700;
  border: 1.5px solid; width: 100%; max-width: 420px;
}
.loading { background: #fefce8; border-color: #fde68a; color: #92400e; }
.error   { background: #fef2f2; border-color: #fca5a5; color: #dc2626; }
.ok      { background: #dcfce7; border-color: #86efac; color: #16a34a; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
.loading .dot { animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.2} }
.spin {
  width: 14px; height: 14px;
  border: 2px solid currentColor; border-top-color: transparent;
  border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.btns { display: flex; gap: 10px; width: 100%; max-width: 420px; }
.btn-go {
  flex: 1; padding: 12px;
  background: linear-gradient(135deg, #0d9488, #0891b2);
  color: #fff; border: none; border-radius: 22px;
  font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: inherit;
  box-shadow: 0 3px 12px rgba(13,148,136,.35);
  transition: all .2s;
}
.btn-go:hover { box-shadow: 0 5px 18px rgba(13,148,136,.5); transform: translateY(-1px); }
.btn-open {
  padding: 12px 18px;
  background: #f1f5f9; color: #475569;
  border: 1.5px solid #e2e8f0; border-radius: 22px;
  font-size: 12px; font-weight: 700; cursor: pointer;
  font-family: inherit; transition: all .2s; white-space: nowrap;
}
.btn-open:hover { background: #e2e8f0; }
#msg { font-size: 11.5px; color: #94a3b8; }
</style>
</head>
<body>

<div class="logo"><span>D</span></div>
<h1>DART 감사보고서 다운로더</h1>

<div class="status loading" id="statusBox">
  <div class="spin"></div>
  <span id="statusTxt">서버 연결 확인 중...</span>
</div>

<div class="box">
  <div class="box-title">ℹ️ 사용 방법</div>
  <p>
    1. <code>DART다운로더_실행.bat</code> 파일을 먼저 실행하세요<br>
    2. 검은 창(cmd)이 열리고 서버가 시작됩니다<br>
    3. 아래 <b>[연결하기]</b> 버튼을 누르거나 자동으로 연결됩니다<br>
    4. 이 페이지를 북마크해 두면 다음에도 바로 사용 가능합니다
  </p>
</div>

<div class="btns">
  <button class="btn-go" id="btnGo" onclick="go()">연결하기</button>
  <button class="btn-open" onclick="window.open('http://localhost:5000/','_blank')">새 탭으로 열기</button>
</div>
<div id="msg"></div>

<script>
const URL = 'http://localhost:5000/';
let tries = 0, done = false, timer;

function setStatus(type, icon, txt) {
  const b = document.getElementById('statusBox');
  b.className = 'status ' + type;
  b.innerHTML = icon + '<span>' + txt + '</span>';
}

function go() {
  window.location.href = URL;
}

async function check() {
  if (done) return;
  tries++;
  document.getElementById('msg').textContent = tries + '초 경과...';

  try {
    await fetch(URL, { mode: 'no-cors', cache: 'no-store' });
    done = true;
    clearTimeout(timer);
    setStatus('ok', '<div class="dot"></div>', '서버 연결됨 — 자동으로 이동합니다...');
    document.getElementById('msg').textContent = '';
    setTimeout(go, 800);
  } catch (e) {
    if (tries >= 30) {
      setStatus('error', '<div class="dot"></div>', '서버에 연결할 수 없습니다');
      document.getElementById('msg').textContent =
        'DART다운로더_실행.bat을 실행한 후 [연결하기] 버튼을 누르세요';
      return;
    }
    setStatus('loading', '<div class="spin"></div>', '서버 시작 대기 중... (' + tries + 's)');
    timer = setTimeout(check, 1000);
  }
}

document.getElementById('btnGo').disabled = false;
check();
</script>
</body>
</html>
